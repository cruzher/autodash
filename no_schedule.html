<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Dashboard Scheduled</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card {
      text-align: center;
      max-width: 520px;
      padding: 0 2rem;
      animation: fadein 0.6s ease;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .clock {
      font-size: 5rem;
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
      color: #8b949e;
      margin-bottom: 2rem;
      font-family: "Segoe UI", "SF Pro Display", system-ui, monospace;
    }

    .icon {
      font-size: 4rem;
      line-height: 1;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #f0f6fc;
    }

    p {
      font-size: 1.1rem;
      color: #8b949e;
      line-height: 1.6;
    }

    .ip-label {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #30363d;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="clock" id="clock">00:00</div>
    <div class="icon">&#x1F4C5;</div>
    <h1>No Dashboard Scheduled</h1>
    <p>The next scheduled dashboard will open automatically.</p>
    <p class="ip-label" id="ip-label"></p>
  </div>
  <script>
    const ip = location.hash.slice(1);
    if (ip) document.getElementById("ip-label").textContent = ip;

    function tick() {
      const now = new Date();
      document.getElementById("clock").textContent =
        now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", hour12: false });
    }
    tick();
    setInterval(tick, 10000);
  </script>
</body>
</html>
