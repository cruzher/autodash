<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>autodash config</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; font-size: 14px; background: #111; color: #e0e0e0; min-height: 100vh; }

  /* ---- top bar ---- */
  header { display: flex; align-items: center; justify-content: space-between;
           padding: 12px 20px; background: #1a1a1a; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: .03em; color: #fff; }
  .save-btn { padding: 7px 18px; background: #2563eb; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .save-btn:hover { background: #1d4ed8; }
  .save-btn:disabled { background: #374151; color: #6b7280; cursor: default; }
  .status { font-size: 12px; color: #6b7280; margin-left: 12px; }
  .status.ok  { color: #22c55e; }
  .status.err { color: #ef4444; }

  /* ---- layout ---- */
  main { max-width: 900px; margin: 0 auto; padding: 20px; }
  .add-site-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px;
                  background: #1f2937; border: 1px dashed #4b5563; border-radius: 6px;
                  color: #9ca3af; cursor: pointer; font-size: 13px; margin-bottom: 16px; }
  .add-site-btn:hover { border-color: #6b7280; color: #d1d5db; }

  /* ---- site card ---- */
  .site-card { background: #1a1a1a; border: 1px solid #2d2d2d; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
  .card-header { display: flex; align-items: center; justify-content: space-between;
                 padding: 10px 14px; cursor: pointer; user-select: none; background: #1f1f1f; }
  .card-header:hover { background: #252525; }
  .card-title { font-weight: 600; font-size: 14px; color: #f3f4f6; display: flex; align-items: center; gap: 8px; }
  .card-title span { font-weight: 400; color: #6b7280; font-size: 12px; }
  .card-actions { display: flex; gap: 8px; align-items: center; }
  .chevron { transition: transform .2s; color: #6b7280; font-size: 12px; }
  .chevron.open { transform: rotate(180deg); }
  .icon-btn { background: none; border: none; cursor: pointer; color: #6b7280; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  .icon-btn:hover { background: #374151; color: #e5e7eb; }
  .icon-btn.danger:hover { background: #7f1d1d; color: #fca5a5; }

  /* ---- card body ---- */
  .card-body { padding: 16px; border-top: 1px solid #2d2d2d; }

  /* ---- field grid ---- */
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em;
                   color: #4b5563; margin: 18px 0 8px; border-bottom: 1px solid #2d2d2d; padding-bottom: 4px; }
  .section-title:first-child { margin-top: 0; }
  .field-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .field-grid.wide { grid-template-columns: 1fr; }
  .field-grid.two { grid-template-columns: 1fr 1fr; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: #9ca3af; }
  .field input, .field select { background: #111; border: 1px solid #374151; border-radius: 5px;
                                 padding: 6px 8px; color: #e5e7eb; font-size: 13px; width: 100%; }
  .field input:focus, .field select:focus { outline: none; border-color: #2563eb; }
  .field input[type=checkbox] { width: auto; accent-color: #2563eb; }
  .checkbox-row { flex-direction: row; align-items: center; gap: 8px; }

  /* ---- dynamic rows (login_steps / schedule) ---- */
  .dynamic-rows { display: flex; flex-direction: column; gap: 6px; }
  .dynamic-row { display: flex; align-items: center; gap: 6px; background: #111; border: 1px solid #2d2d2d; border-radius: 5px; padding: 6px 8px; }
  .dynamic-row select, .dynamic-row input { background: #1a1a1a; border: 1px solid #2d2d2d; border-radius: 4px;
                                             padding: 4px 6px; color: #e5e7eb; font-size: 12px; }
  .dynamic-row select { min-width: 90px; }
  .dynamic-row input { flex: 1; min-width: 0; }
  .add-row-btn { display: inline-flex; align-items: center; gap: 4px; margin-top: 6px;
                 padding: 4px 10px; background: none; border: 1px dashed #374151; border-radius: 4px;
                 color: #6b7280; font-size: 12px; cursor: pointer; }
  .add-row-btn:hover { border-color: #4b5563; color: #9ca3af; }

  /* ---- empty state ---- */
  .empty { text-align: center; padding: 60px 20px; color: #4b5563; }
  .empty p { margin-bottom: 12px; }

</style>
</head>
<body x-data="app()" x-init="init()">

<header>
  <h1>autodash config</h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <span class="status" :class="statusClass" x-text="statusMsg"></span>
    <button class="save-btn" @click="save()" :disabled="saving">Save</button>
  </div>
</header>

<main>
  <button class="add-site-btn" @click="addSite()">+ Add site</button>

  <template x-if="sites.length === 0">
    <div class="empty">
      <p>No sites configured.</p>
      <p style="font-size:12px;">Click "Add site" to create your first dashboard entry.</p>
    </div>
  </template>

  <template x-for="(site, si) in sites" :key="si">
    <div class="site-card">
      <div class="card-header" @click="site._open = !site._open">
        <div class="card-title">
          <span x-text="site.name || '(unnamed)'"></span>
          <span x-text="site.url"></span>
        </div>
        <div class="card-actions">
          <button class="icon-btn" @click.stop="moveSite(si, -1)" title="Move up">&#8593;</button>
          <button class="icon-btn" @click.stop="moveSite(si,  1)" title="Move down">&#8595;</button>
          <button class="icon-btn danger" @click.stop="removeSite(si)" title="Delete">&#10005;</button>
          <span class="chevron" :class="site._open ? 'open' : ''">&#9660;</span>
        </div>
      </div>

      <div class="card-body" x-show="site._open" x-transition.duration.150ms>

        <!-- Identity -->
        <div class="section-title">Identity</div>
        <div class="field-grid">
          <div class="field"><label>Name</label><input x-model="site.name"></div>
          <div class="field"><label>URL</label><input x-model="site.url" placeholder="https://"></div>
          <div class="field"><label>Username</label><input x-model="site.username"></div>
          <div class="field"><label>Password</label><input type="password" x-model="site.password"></div>
        </div>

        <!-- Window -->
        <div class="section-title">Window</div>
        <div class="field-grid">
          <div class="field checkbox-row"><input type="checkbox" x-model="site.fullscreen" id="fs-" + si><label :for="'fs-'+si">Fullscreen (kiosk)</label></div>
          <div class="field"><label>Zoom (1.0 = 100%)</label><input type="number" step="0.1" min="0.1" max="5" x-model.number="site.zoom"></div>
          <div class="field"><label>Window X</label><input type="number" x-model.number="site.window_x"></div>
          <div class="field"><label>Window Y</label><input type="number" x-model.number="site.window_y"></div>
          <div class="field"><label>Width</label><input type="number" x-model.number="site.window_width"></div>
          <div class="field"><label>Height</label><input type="number" x-model.number="site.window_height"></div>
        </div>

        <!-- Login -->
        <div class="section-title">Login</div>
        <div class="field-grid">
          <div class="field checkbox-row"><input type="checkbox" x-model="site.auto_login"><label>Auto login</label></div>
        </div>
        <div x-show="site.auto_login">
          <p style="font-size:12px;color:#4b5563;margin-top:8px;">When enabled, autodash will detect the login form using standard selectors and fill in your credentials automatically. For sites with non-standard login flows, use <strong style="color:#6b7280;">Multi-step login</strong> below instead.</p>
          <div class="field-grid" style="margin-top:10px;">
            <div class="field"><label>Post-login URL</label><input x-model="site.post_login_url" placeholder="leave empty to stay on landing page"></div>
          </div>
          <div class="field-grid two" style="margin-top:10px;">
            <div class="field"><label>Logged-in selector</label><input x-model="site.logged_in_selector" placeholder="CSS selector only present when logged in"></div>
            <div class="field"><label>Logged-in URL fragment</label><input x-model="site.logged_in_url_fragment" placeholder="/dashboard"></div>
          </div>

          <!-- login_steps -->
          <div class="section-title" style="margin-top:14px;">Multi-step login <span style="text-transform:none;font-weight:400;color:#4b5563;font-size:10px;letter-spacing:0;">— custom sequence, replaces standard selectors when non-empty</span></div>
          <div class="dynamic-rows">
            <template x-for="(step, li) in site.login_steps" :key="li">
              <div class="dynamic-row">
                <select x-model="step.action">
                  <option value="fill">fill</option>
                  <option value="click">click</option>
                  <option value="wait_for">wait_for</option>
                  <option value="press">press</option>
                </select>
                <input x-model="step.selector" placeholder="CSS selector (optional for press)">
                <input x-model="step.value" placeholder="value / key (e.g. Enter)">
                <button class="icon-btn danger" @click="site.login_steps.splice(li,1)" title="Remove">&#10005;</button>
              </div>
            </template>
          </div>
          <button class="add-row-btn" @click="site.login_steps.push({action:'fill',selector:'',value:''})">+ Add step</button>
        </div>

        <!-- Availability -->
        <div class="section-title">Availability check</div>
        <div class="field-grid">
          <div class="field checkbox-row"><input type="checkbox" x-model="site.availability_check"><label>Enable availability check</label></div>
          <div class="field"><label>Availability check selector</label><input x-model="site.availability_check_selector" placeholder="#login-form (optional)"></div>
        </div>

        <!-- Schedule -->
        <div class="section-title">Schedule (empty = always active)</div>
        <div class="dynamic-rows">
          <template x-for="(entry, ei) in site.schedule" :key="ei">
            <div class="dynamic-row">
              <input x-model="entry[0]" placeholder="Mon-Fri / * / day" style="max-width:110px;">
              <input x-model="entry[1]" placeholder="09:00" style="max-width:70px;">
              <input x-model="entry[2]" placeholder="17:00" style="max-width:70px;">
              <button class="icon-btn danger" @click="site.schedule.splice(ei,1)" title="Remove">&#10005;</button>
            </div>
          </template>
        </div>
        <button class="add-row-btn" @click="site.schedule.push(['Mon-Fri','09:00','17:00'])">+ Add window</button>
        <p style="font-size:11px;color:#4b5563;margin-top:6px;">Day specs: Mon-Fri &nbsp;|&nbsp; Sat,Sun &nbsp;|&nbsp; Mon &nbsp;|&nbsp; * &nbsp; — overnight ranges supported</p>

      </div>
    </div>
  </template>
</main>

<script>
function defaultSite() {
  return {
    _open: true,
    name: "",
    url: "",
    username: "",
    password: "",
    fullscreen: false,
    zoom: 1.0,
    window_x: 0,
    window_y: 0,
    window_width: 1280,
    window_height: 900,
    post_login_url: "",
    auto_login: true,
    username_selector: "input[type='text'], input[name='username'], input[name='email'], input[id*='user'], input[id*='email']",
    password_selector: "input[type='password']",
    submit_selector: "button[type='submit'], input[type='submit']",
    extra_username_selectors: [],
    extra_password_selectors: [],
    login_steps: [],
    logged_in_selector: "",
    logged_in_url_fragment: "",
    availability_check: true,
    availability_check_selector: "",
    schedule: [],
  };
}

function app() {
  return {
    sites: [],
    saving: false,
    statusMsg: "",
    statusClass: "",

    async init() {
      try {
        const res = await fetch("/sites");
        const data = await res.json();
        this.sites = data.map(s => ({ _open: false, ...s }));
        if (this.sites.length) this.sites[0]._open = true;
        this.setStatus("Loaded", "ok");
      } catch(e) {
        this.setStatus("Failed to load", "err");
      }
    },

    addSite() {
      this.sites.push(defaultSite());
    },

    removeSite(i) {
      if (confirm(`Remove "${this.sites[i].name || 'this site'}"?`)) {
        this.sites.splice(i, 1);
      }
    },

    moveSite(i, dir) {
      const j = i + dir;
      if (j < 0 || j >= this.sites.length) return;
      [this.sites[i], this.sites[j]] = [this.sites[j], this.sites[i]];
    },

    async save() {
      this.saving = true;
      this.setStatus("Saving...", "");
      // Strip the UI-only _open flag before sending
      const payload = this.sites.map(({ _open, ...s }) => s);
      try {
        const res = await fetch("/sites", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error(await res.text());
        this.setStatus("Saved", "ok");
      } catch(e) {
        this.setStatus("Save failed: " + e.message, "err");
      } finally {
        this.saving = false;
      }
    },

    setStatus(msg, cls) {
      this.statusMsg = msg;
      this.statusClass = cls;
    },
  };
}
</script>
</body>
</html>
