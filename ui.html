<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>autodash config</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; font-size: 14px; background: #f3f4f6; color: #111827; min-height: 100vh; display: flex; }

  /* ---- sidebar ---- */
  .sidebar { width: 220px; min-height: 100vh; background: #fff; border-right: 1px solid #e5e7eb;
             display: flex; flex-direction: column; flex-shrink: 0; position: sticky; top: 0; height: 100vh; }
  .sidebar-brand { padding: 20px 18px 16px; border-bottom: 1px solid #e5e7eb; }
  .sidebar-brand h1 { font-size: 17px; font-weight: 700; color: #111827; letter-spacing: -.01em; }
  .sidebar-brand p { font-size: 11px; color: #9ca3af; margin-top: 2px; }
  .sidebar-footer { padding: 12px 10px; border-top: 1px solid #e5e7eb; margin-top: auto; }
  .signout-btn { display: flex; align-items: center; gap: 9px; width: 100%; padding: 8px 10px;
                 border: none; background: none; border-radius: 6px; font-size: 13px; font-weight: 500;
                 color: #6b7280; cursor: pointer; text-align: left; }
  .signout-btn:hover { background: #fee2e2; color: #dc2626; }
  .sidebar-nav { padding: 10px 10px; flex: 1; }
  .nav-btn { display: flex; align-items: center; gap: 9px; width: 100%; padding: 8px 10px;
             border: none; background: none; border-radius: 6px; font-size: 13px; font-weight: 500;
             color: #6b7280; cursor: pointer; text-align: left; transition: background .12s, color .12s; }
  .nav-btn:hover { background: #f3f4f6; color: #111827; }
  .nav-btn.active { background: #eff6ff; color: #2563eb; }
  .nav-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* ---- main content ---- */
  .content { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .topbar { display: flex; align-items: center; justify-content: space-between;
            padding: 14px 24px; background: #fff; border-bottom: 1px solid #e5e7eb; }
  .topbar h2 { font-size: 15px; font-weight: 600; color: #111827; }
  .topbar-actions { display: flex; align-items: center; gap: 10px; }
  .status { font-size: 12px; color: #9ca3af; }
  .status.ok  { color: #16a34a; }
  .status.err { color: #dc2626; }
  .btn-primary { padding: 7px 16px; background: #2563eb; color: #fff; border: none; border-radius: 6px;
                 cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-primary:disabled { background: #bfdbfe; color: #fff; cursor: default; }
  .btn-secondary { padding: 7px 14px; background: #fff; color: #374151; border: 1px solid #d1d5db;
                   border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
  .btn-secondary:hover { background: #f9fafb; border-color: #9ca3af; }

  .page { padding: 24px; flex: 1; }

  /* ---- site cards ---- */
  .add-site-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px;
                  background: #fff; border: 1px dashed #d1d5db; border-radius: 6px;
                  color: #6b7280; cursor: pointer; font-size: 13px; margin-bottom: 16px; }
  .add-site-btn:hover { border-color: #6b7280; color: #374151; }
  .site-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
  .card-header { display: flex; align-items: center; justify-content: space-between;
                 padding: 11px 14px; cursor: pointer; user-select: none; }
  .card-header:hover { background: #f9fafb; }
  .card-title { font-weight: 600; font-size: 14px; color: #111827; display: flex; align-items: center; gap: 8px; }
  .card-title span { font-weight: 400; color: #9ca3af; font-size: 12px; }
  .card-actions { display: flex; gap: 6px; align-items: center; }
  .chevron { transition: transform .2s; color: #9ca3af; font-size: 12px; }
  .chevron.open { transform: rotate(180deg); }
  .icon-btn { background: none; border: none; cursor: pointer; color: #9ca3af; padding: 3px 7px;
              border-radius: 4px; font-size: 12px; }
  .icon-btn:hover { background: #f3f4f6; color: #374151; }
  .icon-btn.danger:hover { background: #fee2e2; color: #dc2626; }
  .icon-btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }
  .card-body { padding: 16px; border-top: 1px solid #f3f4f6; }

  /* ---- fields ---- */
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em;
                   color: #9ca3af; margin: 18px 0 8px; border-bottom: 1px solid #f3f4f6; padding-bottom: 4px; }
  .section-title:first-child { margin-top: 0; }
  .field-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .field-grid.two { grid-template-columns: 1fr 1fr; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: #6b7280; font-weight: 500; }
  .field input, .field select { background: #fff; border: 1px solid #d1d5db; border-radius: 5px;
                                 padding: 6px 8px; color: #111827; font-size: 13px; width: 100%; }
  .field input:focus, .field select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px #bfdbfe; }
  .field input[type=checkbox] { width: auto; accent-color: #2563eb; }
  .checkbox-row { flex-direction: row; align-items: center; gap: 8px; }

  /* ---- dynamic rows ---- */
  .dynamic-rows { display: flex; flex-direction: column; gap: 6px; }
  .dynamic-row { display: flex; align-items: center; gap: 6px; background: #f9fafb;
                 border: 1px solid #e5e7eb; border-radius: 5px; padding: 6px 8px; }
  .dynamic-row select, .dynamic-row input { background: #fff; border: 1px solid #d1d5db; border-radius: 4px;
                                             padding: 4px 6px; color: #111827; font-size: 12px; }
  .dynamic-row select { min-width: 90px; }
  .dynamic-row input { flex: 1; min-width: 0; }
  .sched-invalid input { border-color: #f87171 !important; background: #fff1f1 !important; }
  .add-row-btn { display: inline-flex; align-items: center; gap: 4px; margin-top: 6px;
                 padding: 4px 10px; background: none; border: 1px dashed #d1d5db; border-radius: 4px;
                 color: #9ca3af; font-size: 12px; cursor: pointer; }
  .add-row-btn:hover { border-color: #6b7280; color: #374151; }

  /* ---- log viewer ---- */
  .log-viewer { background: #111827; border-radius: 8px; padding: 0; overflow: hidden; display: flex; flex-direction: column; height: calc(100vh - 130px); }
  .log-toolbar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #1f2937; border-bottom: 1px solid #374151; flex-shrink: 0; }
  .log-toolbar label { font-size: 12px; color: #9ca3af; }
  .log-toolbar input[type=checkbox] { accent-color: #2563eb; }
  .log-lines { flex: 1; overflow-y: auto; padding: 12px 14px; font-family: ui-monospace, monospace; font-size: 12px; line-height: 1.6; }
  .log-line { white-space: pre-wrap; word-break: break-all; color: #d1d5db; }
  .log-line.warn  { color: #fbbf24; }
  .log-line.error { color: #f87171; }
  .log-line.debug { color: #6b7280; }
  .log-empty { color: #4b5563; font-size: 13px; padding: 20px 0; }

  /* ---- modal overlay ---- */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:100; }

  /* ---- hint text ---- */
  .hint { font-size: 12px; color: #9ca3af; margin-top: 8px; line-height: 1.5; }
  .hint strong { color: #6b7280; }

  /* ---- empty state ---- */
  .empty { text-align: center; padding: 60px 20px; color: #9ca3af; }
  .empty p { margin-bottom: 8px; }

</style>
</head>
<body x-data="app()" x-init="init()">

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <h1>Autodash</h1>
    <p>Dashboard manager</p>
  </div>
  <nav class="sidebar-nav">
    <button class="nav-btn" :class="page === 'home' && 'active'" @click="page = 'home'; fetchScreenshots()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Home
    </button>
    <button class="nav-btn" :class="page === 'sites' && 'active'" @click="page = 'sites'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      Sites
    </button>
    <button class="nav-btn" :class="page === 'settings' && 'active'" @click="page = 'settings'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Settings
    </button>
    <button class="nav-btn" :class="page === 'logs' && 'active'" @click="page = 'logs'; fetchLogs()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      Logs
    </button>
  </nav>
  <div class="sidebar-footer">
    <button class="signout-btn" @click="signOut()">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sign out
    </button>
  </div>
</aside>

<!-- Main -->
<div class="content">

  <!-- Home page -->
  <template x-if="page === 'home'">
    <div style="display:flex;flex-direction:column;flex:1;">
      <div class="topbar">
        <h2>Home</h2>
      </div>
      <div class="page">

        <!-- Monitor selector (only shown when more than one monitor is detected) -->
        <template x-if="monitors.length > 1">
          <div style="margin-bottom:8px;display:flex;align-items:center;gap:8px;">
            <label style="font-size:13px;color:#9ca3af;">Monitor</label>
            <select x-model.number="selectedMonitor" @change="fetchScreenshots()"
                    style="background:#1f2937;color:#f9fafb;border:1px solid #374151;border-radius:4px;padding:4px 8px;font-size:13px;">
              <template x-for="m in monitors" :key="m.index">
                <option :value="m.index" x-text="m.label"></option>
              </template>
            </select>
          </div>
        </template>

        <!-- Display card -->
        <div class="site-card">
          <div class="card-header" style="cursor:default;">
            <!-- Left: remote control buttons -->
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
              <button class="btn-secondary"
                      :style="schedulerPaused ? 'background:#fff7ed;color:#ea580c;border-color:#fed7aa;' : ''"
                      @click="toggleSchedulerPause()"
                      :title="schedulerPaused ? 'Resume scheduled sites' : 'Pause scheduled sites'">
                <span x-text="schedulerPaused ? '⏸ Paused' : '▶ Running'"></span>
              </button>
              <span style="width:1px;height:20px;background:#d1d5db;display:inline-block;flex-shrink:0;"></span>
              <button class="btn-secondary" @click="sendKey('super')">⊞</button>
              <span style="width:1px;height:20px;background:#d1d5db;display:inline-block;flex-shrink:0;"></span>
              <button class="btn-secondary" @click="showTextPopup = true; $nextTick(() => $refs.textInput.focus())">Send text</button>
              <span x-show="remoteFeedback || clickFeedback"
                    x-text="remoteFeedback || clickFeedback"
                    style="font-size:12px;color:#34d399;"></span>
            </div>
            <!-- Right: updated timestamp + refresh + live status -->
            <div style="display:flex;align-items:center;gap:8px;">
              <span x-show="screenshotUpdated" x-text="screenshotUpdated"
                    style="font-size:12px;color:#9ca3af;"></span>
              <button class="btn-secondary"
                      :title="displayFitMode ? 'Switch to actual resolution' : 'Switch to fit window'"
                      @click="displayFitMode = !displayFitMode"
                      x-text="displayFitMode ? 'Fit' : 'Actual'"></button>
              <button class="btn-secondary" @click="fetchScreenshots()">Refresh</button>
              <span class="status" :class="screenshotError ? 'err' : 'ok'"
                    x-text="screenshotError || 'live'"></span>
            </div>
          </div>
          <div :style="displayFitMode
            ? 'background:#111827;border-radius:0 0 8px 8px;overflow:hidden;line-height:0;'
            : 'background:#111827;border-radius:0 0 8px 8px;overflow:auto;line-height:0;'">
            <template x-if="screenshotSrc">
              <img :src="screenshotSrc"
                   :style="displayFitMode ? 'max-width:100%;max-height:calc(100vh - 160px);width:auto;height:auto;display:block;cursor:crosshair;' : 'display:block;cursor:crosshair;'"
                   alt="Display screenshot"
                   @click="sendClick($event)"
                   @contextmenu="sendRightClick($event)"
                   @mouseenter="setKeyCapture(true)"
                   @mouseleave="setKeyCapture(false)">
            </template>
            <template x-if="!screenshotSrc && screenshotError">
              <div style="padding:40px;text-align:center;color:#6b7280;font-size:13px;" x-text="screenshotError"></div>
            </template>
            <template x-if="!screenshotSrc && !screenshotError">
              <div style="padding:40px;text-align:center;color:#6b7280;font-size:13px;">Loading...</div>
            </template>
          </div>
        </div>

      </div>

      <!-- Send text popup -->
      <div x-show="showTextPopup" class="modal-overlay" @click.self="showTextPopup = false">
        <div class="site-card" style="width:420px;max-width:90vw;margin:0;">
          <div class="card-header" style="cursor:default;">
            <div class="card-title">Send text</div>
            <button class="icon-btn" @click="showTextPopup = false" title="Close">&#10005;</button>
          </div>
          <div class="card-body">
            <textarea x-model="remoteText"
                      x-ref="textInput"
                      placeholder="Type text to send…"
                      rows="6"
                      style="width:100%;border:1px solid #d1d5db;border-radius:5px;padding:6px 8px;color:#111827;font-size:13px;resize:vertical;font-family:inherit;"></textarea>
            <div style="margin-top:10px;display:flex;align-items:center;justify-content:space-between;">
              <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#6b7280;cursor:pointer;">
                <input type="checkbox" x-model="remoteTextEnter" style="accent-color:#2563eb;">
                Send Enter after
              </label>
              <div style="display:flex;gap:6px;">
                <button class="btn-secondary" @click="sendText('type')" :disabled="!remoteText">Type text</button>
                <button class="btn-primary" @click="sendText('paste')" :disabled="!remoteText">Paste text</button>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </template>

  <!-- Sites page -->
  <template x-if="page === 'sites'">
    <div style="display:flex;flex-direction:column;flex:1;">
      <div class="topbar">
        <h2>Sites</h2>
        <div class="topbar-actions">
          <span class="status" :class="statusClass" x-text="statusMsg"></span>
          <button class="btn-secondary" @click="exportSites()">Export</button>
          <button class="btn-secondary" @click="$refs.importFile.click()">Import</button>
          <input type="file" accept=".json" x-ref="importFile" class="hidden" @change="importSites($event)">
          <button class="btn-secondary" @click="addSite()">+ Add site</button>
          <button class="btn-primary" @click="save()" :disabled="saving">Save</button>
        </div>
      </div>
      <div class="page">

        <template x-if="sites.length === 0">
          <div class="empty">
            <p>No sites configured.</p>
            <p style="font-size:12px;">Click "Add site" to get started.</p>
          </div>
        </template>

        <template x-for="(site, si) in sites" :key="si">
          <div class="site-card">
            <div class="card-header" @click="site._open = !site._open">
              <div class="card-title">
                <span x-text="site.name || '(unnamed)'"></span>
                <span x-text="site.url"></span>
              </div>
              <div class="card-actions">
                <button class="icon-btn" @click.stop="moveSite(si, -1)" title="Move up">&#8593;</button>
                <button class="icon-btn" @click.stop="moveSite(si,  1)" title="Move down">&#8595;</button>
                <button class="icon-btn danger" @click.stop="removeSite(si)" title="Delete">&#10005;</button>
                <span class="chevron" :class="site._open ? 'open' : ''">&#9660;</span>
              </div>
            </div>

            <div class="card-body" x-show="site._open" x-transition.duration.150ms>

              <!-- Identity -->
              <div class="section-title">Identity</div>
              <div class="field-grid">
                <div class="field"><label>Name</label><input x-model="site.name"></div>
                <div class="field"><label>URL</label><input x-model="site.url" placeholder="https://"></div>
                <div class="field"><label>Username</label><input x-model="site.username"></div>
                <div class="field"><label>Password</label><input type="password" x-model="site.password"></div>
                <div class="field"><label>TOTP secret</label><input type="password" x-model="site.totp_secret" placeholder="Base32 secret (optional)"></div>
              </div>

              <!-- Window -->
              <div class="section-title">Window</div>
              <div class="field-grid">
                <div class="field checkbox-row"><input type="checkbox" x-model="site.fullscreen" :id="'fs-'+si"><label :for="'fs-'+si">Fullscreen (kiosk)</label></div>
                <div class="field"><label>Window X</label><input type="number" x-model.number="site.window_x"></div>
                <div class="field"><label>Window Y</label><input type="number" x-model.number="site.window_y"></div>
                <div class="field"><label>Width</label><input type="number" x-model.number="site.window_width"></div>
                <div class="field"><label>Height</label><input type="number" x-model.number="site.window_height"></div>
              </div>

              <!-- Login -->
              <div class="section-title">Login</div>
              <div class="field-grid">
                <div class="field checkbox-row"><input type="checkbox" x-model="site.auto_login" :id="'al-'+si"><label :for="'al-'+si">Auto login</label></div>
              </div>
              <div x-show="site.auto_login">
                <p class="hint" style="margin-top:8px;">autodash will detect the login form using standard selectors and fill in your credentials automatically. For sites with non-standard login flows, use <strong>Multi-step login</strong> below instead.</p>
                <div class="field-grid two" style="margin-top:10px;">
                  <div class="field"><label>Logged-in selector</label><input x-model="site.logged_in_selector" placeholder="CSS selector only present when logged in"></div>
                  <div class="field"><label>Logged-in URL fragment</label><input x-model="site.logged_in_url_fragment" placeholder="/dashboard"></div>
                </div>

                <!-- login_steps -->
                <div class="section-title" style="margin-top:14px;">Multi-step login <span style="text-transform:none;font-weight:400;color:#9ca3af;font-size:10px;letter-spacing:0;">— custom sequence, replaces standard selectors when non-empty</span></div>
                <div class="dynamic-rows">
                  <template x-for="(step, li) in site.login_steps" :key="li">
                    <div class="dynamic-row">
                      <select x-model="step.action">
                        <option value="fill">fill</option>
                        <option value="click">click</option>
                        <option value="wait_for">wait_for</option>
                        <option value="press">press</option>
                      </select>
                      <input x-model="step.selector" placeholder="CSS selector (optional for press)">
                      <template x-if="step.action === 'fill'">
                        <div style="display:contents">
                          <select :value="['{username}','{password}','{totp}'].includes(step.value) ? step.value : 'custom'" @change="step.value = $event.target.value === 'custom' ? '' : $event.target.value">
                            <option value="{username}">username</option>
                            <option value="{password}">password</option>
                            <option value="{totp}">totp</option>
                            <option value="custom">custom</option>
                          </select>
                          <input x-show="!['{username}','{password}','{totp}'].includes(step.value)" x-model="step.value" placeholder="custom value">
                        </div>
                      </template>
                      <input x-show="step.action === 'press'" x-model="step.value" placeholder="key (e.g. Enter)">
                      <button class="icon-btn" @click="li > 0 && site.login_steps.splice(li-1, 0, site.login_steps.splice(li,1)[0])" :disabled="li === 0" title="Move up">&#9650;</button>
                      <button class="icon-btn" @click="li < site.login_steps.length-1 && site.login_steps.splice(li+1, 0, site.login_steps.splice(li,1)[0])" :disabled="li === site.login_steps.length-1" title="Move down">&#9660;</button>
                      <button class="icon-btn danger" @click="site.login_steps.splice(li,1)" title="Remove">&#10005;</button>
                    </div>
                  </template>
                </div>
                <button class="add-row-btn" @click="site.login_steps.push({action:'fill',selector:'',value:''})">+ Add step</button>
              </div>

              <!-- Post Login -->
              <div class="section-title">Post Login</div>
              <div class="field-grid">
                <div class="field checkbox-row"><input type="checkbox" x-model="site.post_login_enabled" :id="'pl-'+si"><label :for="'pl-'+si">Enable post login</label></div>
              </div>
              <div x-show="site.post_login_enabled">
                <div class="field-grid" style="margin-top:10px;">
                  <div class="field"><label>Post-login URL</label><input x-model="site.post_login_url" placeholder="leave empty to stay on landing page"></div>
                </div>
                <!-- post_login_steps -->
                <div class="section-title" style="margin-top:14px;">Post-login steps <span style="text-transform:none;font-weight:400;color:#9ca3af;font-size:10px;letter-spacing:0;">— actions to run after login is verified and post-login URL loaded</span></div>
                <div class="dynamic-rows">
                  <template x-for="(step, li) in site.post_login_steps" :key="li">
                    <div class="dynamic-row">
                      <select x-model="step.action">
                        <option value="fill">fill</option>
                        <option value="click">click</option>
                        <option value="wait_for">wait_for</option>
                        <option value="press">press</option>
                      </select>
                      <input x-model="step.selector" placeholder="CSS selector (optional for press)">
                      <template x-if="step.action === 'fill'">
                        <div style="display:contents">
                          <select :value="['{username}','{password}','{totp}'].includes(step.value) ? step.value : 'custom'" @change="step.value = $event.target.value === 'custom' ? '' : $event.target.value">
                            <option value="{username}">username</option>
                            <option value="{password}">password</option>
                            <option value="{totp}">totp</option>
                            <option value="custom">custom</option>
                          </select>
                          <input x-show="!['{username}','{password}','{totp}'].includes(step.value)" x-model="step.value" placeholder="custom value">
                        </div>
                      </template>
                      <input x-show="step.action === 'press'" x-model="step.value" placeholder="key (e.g. Enter)">
                      <button class="icon-btn" @click="li > 0 && site.post_login_steps.splice(li-1, 0, site.post_login_steps.splice(li,1)[0])" :disabled="li === 0" title="Move up">&#9650;</button>
                      <button class="icon-btn" @click="li < site.post_login_steps.length-1 && site.post_login_steps.splice(li+1, 0, site.post_login_steps.splice(li,1)[0])" :disabled="li === site.post_login_steps.length-1" title="Move down">&#9660;</button>
                      <button class="icon-btn danger" @click="site.post_login_steps.splice(li,1)" title="Remove">&#10005;</button>
                    </div>
                  </template>
                </div>
                <button class="add-row-btn" @click="site.post_login_steps.push({action:'fill',selector:'',value:''})">+ Add step</button>
              </div>

              <!-- Availability -->
              <div class="section-title">Availability check</div>
              <div class="field-grid">
                <div class="field checkbox-row"><input type="checkbox" x-model="site.availability_check" :id="'av-'+si"><label :for="'av-'+si">Enable availability check</label></div>
                <div class="field" x-show="site.availability_check">
                  <label>Check mode</label>
                  <select x-model="site.availability_check_mode">
                    <option value="http">HTTP response only</option>
                    <option value="selector">HTTP + CSS selector</option>
                  </select>
                </div>
                <div class="field" x-show="site.availability_check && site.availability_check_mode === 'selector'">
                  <label>CSS selector</label>
                  <input x-model="site.availability_check_selector" placeholder="#login-form">
                </div>
              </div>

              <!-- Schedule -->
              <div class="section-title">Schedule <span style="text-transform:none;font-weight:400;color:#9ca3af;font-size:10px;letter-spacing:0;">— empty = always active</span></div>
              <div class="dynamic-rows">
                <template x-for="(entry, ei) in site.schedule" :key="ei">
                  <div class="dynamic-row" :class="!schedEntryValid(entry) && 'sched-invalid'">
                    <input x-model="entry[0]" placeholder="Mon-Fri / * / day" style="max-width:110px;" :title="schedDayHint">
                    <input x-model="entry[1]" placeholder="09:00" style="max-width:70px;" :title="schedTimeHint">
                    <input x-model="entry[2]" placeholder="17:00" style="max-width:70px;" :title="schedTimeHint">
                    <button class="icon-btn danger" @click="site.schedule.splice(ei,1)" title="Remove">&#10005;</button>
                  </div>
                </template>
              </div>
              <button class="add-row-btn" @click="site.schedule.push(['Mon-Fri','09:00','17:00'])">+ Add window</button>
              <p style="font-size:11px;color:#9ca3af;margin-top:6px;">Day specs: Mon-Fri &nbsp;|&nbsp; Sat,Sun &nbsp;|&nbsp; Mon &nbsp;|&nbsp; * &nbsp; — overnight ranges supported</p>

              <!-- Page refresh -->
              <div class="section-title">Page refresh</div>
              <div class="field-grid">
                <div class="field checkbox-row"><input type="checkbox" x-model="site.auto_refresh" :id="'ar-'+si"><label :for="'ar-'+si">Auto refresh</label></div>
              </div>
              <div x-show="site.auto_refresh" style="margin-top:10px;">
                <div class="field-grid" style="grid-template-columns:1fr 1fr;">
                  <div class="field">
                    <label>Refresh interval (seconds)</label>
                    <input type="number" min="60" step="30" x-model.number="site.refresh_interval">
                  </div>
                  <div class="field" style="justify-content:flex-end;">
                    <label style="visibility:hidden;">-</label>
                    <p class="hint">How often this site's page is reloaded. Minimum 60 s.</p>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </template>

      </div>
    </div>
  </template>

  <!-- Settings page -->
  <template x-if="page === 'settings'">
    <div style="display:flex;flex-direction:column;flex:1;">
      <div class="topbar">
        <h2>Settings</h2>
        <div class="topbar-actions">
          <span class="status" :class="settingsStatusClass" x-text="settingsStatusMsg"></span>
          <button class="btn-primary" @click="saveSettings()" :disabled="settingsSaving">Save</button>
        </div>
      </div>
      <div class="page">
        <div class="site-card" style="max-width:480px;">
          <div class="card-body" style="display:block;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
              <div class="section-title" style="margin-top:0;margin-bottom:0;">System information</div>
              <button class="btn-secondary" style="color:#ef4444;" @click="reboot()">Reboot</button>
            </div>
            <div class="field-grid" style="grid-template-columns:auto 1fr;gap:4px 16px;">
              <template x-if="sysinfo">
                <template x-for="[k,v] in Object.entries(sysinfo)" :key="k">
                  <template x-if="true">
                    <div style="display:contents">
                      <span style="color:#9ca3af;font-size:12px;text-transform:capitalize;" x-text="k.replace('_',' ')"></span>
                      <span style="font-size:12px;font-family:monospace;" x-text="v"></span>
                    </div>
                  </template>
                </template>
              </template>
              <template x-if="!sysinfo">
                <span style="color:#9ca3af;font-size:12px;">Loading…</span>
              </template>
            </div>
            <template x-if="autostartSupported">
              <div>
                <div class="section-title">Startup</div>
                <div class="field checkbox-row">
                  <input type="checkbox" id="start-at-login" x-model="startAtLogin" @change="setAutostart()">
                  <label for="start-at-login">Start automatically at login</label>
                </div>
                <p class="hint" style="margin-top:6px;">When enabled, autodash will start automatically when you log in.</p>
              </div>
            </template>
            <div class="section-title">Display</div>
            <div class="field checkbox-row">
              <input type="checkbox" id="sleep-when-idle" x-model="settings.sleep_when_idle">
              <label for="sleep-when-idle">Allow display sleep when nothing is scheduled</label>
            </div>
            <p class="hint" style="margin-top:6px;">When enabled, the display is allowed to sleep normally during periods with no active dashboard. When disabled, the display stays awake at all times.</p>
            <div class="section-title">Monitoring heartbeat</div>
            <div class="field-grid" style="grid-template-columns:1fr 1fr;">
              <div class="field">
                <label>Webhook URL</label>
                <input type="url" x-model="settings.heartbeat_url" placeholder="https://uptime.example.com/ping/...">
              </div>
              <div class="field">
                <label>Interval (seconds)</label>
                <input type="number" min="10" step="10" x-model.number="settings.heartbeat_interval">
              </div>
            </div>
            <p class="hint" style="margin-top:6px;">When set, autodash will GET the webhook URL at the configured interval so external monitoring services know the system is alive.</p>
            <div class="section-title">Remote control</div>
            <div class="field-grid" style="grid-template-columns:1fr 1fr;">
              <div class="field">
                <label>Active refresh interval (seconds)</label>
                <input type="number" min="1" step="1" x-model.number="settings.remote_active_interval">
              </div>
              <div class="field">
                <label>Idle refresh interval (seconds)</label>
                <input type="number" min="5" step="5" x-model.number="settings.remote_idle_interval">
              </div>
            </div>
            <p class="hint" style="margin-top:6px;">Screenshot refresh rate when remotely controlling (active) vs. when idle. Active mode is triggered by mouse or keyboard input and times out after 10 seconds of inactivity.</p>
            <div class="section-title">Updates</div>
            <div class="field checkbox-row" style="margin-bottom:10px;">
              <input type="checkbox" id="auto-update" x-model="settings.auto_update">
              <label for="auto-update">Automatically pull latest code on startup</label>
            </div>
            <button class="btn-secondary" @click="runUpdate()" :disabled="updating">
              <span x-text="updating ? 'Updating…' : 'Pull latest from git'"></span>
            </button>
            <template x-if="updateOutput">
              <pre style="margin-top:10px;padding:10px;background:#111;border-radius:6px;font-size:11px;color:#d1d5db;white-space:pre-wrap;word-break:break-all;" x-text="updateOutput"></pre>
            </template>
            <template x-if="updateOutput && updateDone">
              <p class="hint" style="margin-top:6px;color:#f59e0b;">Reboot the system to apply the update.</p>
            </template>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- Logs page -->
  <template x-if="page === 'logs'">
    <div style="display:flex;flex-direction:column;flex:1;min-height:0;">
      <div class="topbar">
        <h2>Logs</h2>
        <div class="topbar-actions">
          <span style="font-size:12px;color:#9ca3af;" x-text="logUpdated"></span>
          <button class="btn-secondary" @click="fetchLogs()">Refresh</button>
        </div>
      </div>
      <div style="padding:16px;flex:1;min-height:0;display:flex;flex-direction:column;">
        <div class="log-viewer">
          <div class="log-toolbar">
            <label><input type="checkbox" x-model="logAutoScroll"> Auto-scroll</label>
            <label><input type="checkbox" x-model="logAutoRefresh" @change="toggleAutoRefresh()"> Auto-refresh (5 s)</label>
          </div>
          <div class="log-lines" x-ref="logLines">
            <template x-if="logLines.length === 0">
              <div class="log-empty">No log entries yet.</div>
            </template>
            <template x-for="(line, i) in logLines" :key="i">
              <div class="log-line" :class="logLineClass(line)" x-text="line"></div>
            </template>
          </div>
        </div>
      </div>
    </div>
  </template>

</div>

<script>
function defaultSite() {
  return {
    _open: true,
    name: "",
    url: "",
    username: "",
    password: "",
    totp_secret: "",
    fullscreen: false,
    window_x: 0,
    window_y: 0,
    window_width: 1280,
    window_height: 900,
    post_login_url: "",
    post_login_enabled: false,
    auto_login: true,
    username_selector: "input[type='text'], input[name='username'], input[name='email'], input[id*='user'], input[id*='email']",
    password_selector: "input[type='password']",
    submit_selector: "button[type='submit'], input[type='submit'], button:has-text('Login'), button:has-text('Sign in')",
    extra_username_selectors: [],
    extra_password_selectors: [],
    login_steps: [],
    post_login_steps: [],
    logged_in_selector: "",
    logged_in_url_fragment: "",
    availability_check: true,
    availability_check_mode: "http",
    availability_check_selector: "",
    schedule: [],
    auto_refresh: true,
    refresh_interval: 600,
  };
}

async function apiFetch(url, opts = {}) {
  const res = await fetch(url, opts);
  if (res.status === 401) { location.href = "/login"; return null; }
  return res;
}

// ---- app -------------------------------------------------------------------

function app() {
  return {
    page: "home",
    sites: [],
    saving: false,
    statusMsg: "",
    statusClass: "",
    settings: { sleep_when_idle: true, heartbeat_url: "", heartbeat_interval: 60, auto_update: true, remote_active_interval: 2, remote_idle_interval: 30 },
    sysinfo: null,
    startAtLogin: false,
    autostartSupported: false,
    updating: false,
    updateOutput: "",
    updateDone: false,
    settingsSaving: false,
    settingsStatusMsg: "",
    settingsStatusClass: "",
    logLines: [],
    logUpdated: "",
    logAutoScroll: true,
    logAutoRefresh: false,
    _logTimer: null,
    displayFitMode: true,
    screenshotSrc: null,
    screenshotError: null,
    screenshotUpdated: "",
    _screenshotTimer: null,
    monitors: [],
    selectedMonitor: 1,
    showTextPopup: false,
    remoteText: "",
    remoteTextEnter: false,
    remoteFeedback: "",
    _remoteFeedbackTimer: null,
    clickFeedback: "",
    _clickFeedbackTimer: null,
    keyCapture: false,
    _keyCaptureHandler: null,
    remoteActive: false,
    _remoteIdleTimer: null,
    schedulerPaused: false,
    schedDayHint: "Day spec: Mon-Fri, Sat,Sun, Mon, * (every day)",
    schedTimeHint: "Time in HH:MM format, e.g. 09:00",

    async init() {
      try {
        const res = await apiFetch("/sites");
        if (!res) return;
        const data = await res.json();
        this.sites = data.map(s => ({ _open: false, login_steps: [], post_login_steps: [], ...s }));
        if (this.sites.length) this.sites[0]._open = true;
        this.setStatus("Loaded", "ok");
      } catch(e) {
        this.setStatus("Failed to load", "err");
      }
      try {
        const res = await apiFetch("/settings");
        if (res) this.settings = await res.json();
      } catch(e) { /* use defaults */ }
      try {
        const res = await apiFetch("/sysinfo");
        if (res) this.sysinfo = await res.json();
      } catch(e) { /* non-critical */ }
      try {
        const res = await apiFetch("/autostart");
        if (res) { const d = await res.json(); this.startAtLogin = d.enabled; this.autostartSupported = d.supported; }
      } catch(e) { /* non-critical */ }
      if (this.page === 'home') {
        await this.fetchScreenshots();
        this.fetchMonitors();
      }
      this.fetchSchedulerPause();
      this.scheduleScreenshot();
      document.addEventListener('visibilitychange', () => this.scheduleScreenshot());
      // Sync keyboard capture and screenshot scheduler when navigating
      this.$watch('page', (newPage) => {
        if (newPage !== 'home' && this.keyCapture) this.setKeyCapture(false);
        this.scheduleScreenshot();
      });
    },

    scheduleScreenshot() {
      clearTimeout(this._screenshotTimer);
      if (this.page !== 'home' || document.visibilityState === 'hidden') return;
      const ms = (this.remoteActive
        ? (this.settings.remote_active_interval || 2)
        : (this.settings.remote_idle_interval  || 30)) * 1000;
      this._screenshotTimer = setTimeout(async () => {
        await this.fetchScreenshots();
        this.scheduleScreenshot();
      }, ms);
    },

    onRemoteActivity() {
      if (!this.remoteActive) {
        this.remoteActive = true;
        this.scheduleScreenshot();
      }
      clearTimeout(this._remoteIdleTimer);
      this._remoteIdleTimer = setTimeout(() => {
        this.remoteActive = false;
        this.scheduleScreenshot();
      }, 10000);
    },

    async fetchScreenshots() {
      try {
        const res = await apiFetch(`/screenshot?monitor=${this.selectedMonitor}`);
        if (!res) return;
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          this.screenshotError = body.detail || "Failed to capture display";
          return;
        }
        const blob = await res.blob();
        if (this.screenshotSrc) URL.revokeObjectURL(this.screenshotSrc);
        this.screenshotSrc = URL.createObjectURL(blob);
        this.screenshotError = null;
        this.screenshotUpdated = "Updated " + new Date().toLocaleTimeString();
      } catch(e) {
        this.screenshotError = e.message;
      }
    },

    async fetchMonitors() {
      const res = await apiFetch("/monitors");
      if (!res || !res.ok) return;
      this.monitors = await res.json();
      if (this.monitors.length) this.selectedMonitor = this.monitors[0].index;
    },

    async sendClick(event) {
      this.onRemoteActivity();
      const img = event.currentTarget;
      const rect = img.getBoundingClientRect();
      const x = (event.clientX - rect.left) / rect.width;
      const y = (event.clientY - rect.top)  / rect.height;
      const res = await apiFetch("/click", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ x, y, monitor: this.selectedMonitor }),
      });
      clearTimeout(this._clickFeedbackTimer);
      this.clickFeedback = res && res.ok ? "Click sent" : "Click failed";
      this._clickFeedbackTimer = setTimeout(() => this.clickFeedback = "", 1500);
    },

    async sendText(method = "paste") {
      this.onRemoteActivity();
      if (!this.remoteText) return;
      const res = await apiFetch("/type", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: this.remoteText, method, send_enter: this.remoteTextEnter }),
      });
      clearTimeout(this._remoteFeedbackTimer);
      this.remoteFeedback = res && res.ok ? "Sent" : "Failed";
      this._remoteFeedbackTimer = setTimeout(() => this.remoteFeedback = "", 1500);
      if (res && res.ok) { this.remoteText = ""; this.showTextPopup = false; }
    },

    async sendKey(key) {
      this.onRemoteActivity();
      const res = await apiFetch("/key", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key }),
      });
      clearTimeout(this._remoteFeedbackTimer);
      const label = Array.isArray(key) ? key.join('+') : key;
      this.remoteFeedback = res && res.ok ? label + " sent" : "Failed";
      this._remoteFeedbackTimer = setTimeout(() => this.remoteFeedback = "", 1500);
    },

    setKeyCapture(on) {
      if (on === this.keyCapture) return;
      this.keyCapture = on;
      if (on) {
        this._keyCaptureHandler = (e) => this.handleKeyCapture(e);
        document.addEventListener('keydown', this._keyCaptureHandler);
      } else {
        document.removeEventListener('keydown', this._keyCaptureHandler);
        this._keyCaptureHandler = null;
      }
    },

    handleKeyCapture(event) {
      if (this.showTextPopup) return;
      if (event.repeat) return;
      const key = event.key;
      if (['Control', 'Alt', 'Shift', 'Meta', 'CapsLock', 'NumLock', 'ScrollLock'].includes(key)) return;

      event.preventDefault();
      event.stopPropagation();
      this.onRemoteActivity();

      const KEY_MAP = {
        'Enter': 'enter', 'Escape': 'escape', 'Tab': 'tab',
        'Backspace': 'backspace', 'Delete': 'delete', 'Insert': 'insert',
        'ArrowUp': 'up', 'ArrowDown': 'down', 'ArrowLeft': 'left', 'ArrowRight': 'right',
        'Home': 'home', 'End': 'end', 'PageUp': 'pageup', 'PageDown': 'pagedown',
        ' ': 'space',
        'F1': 'f1', 'F2': 'f2', 'F3': 'f3', 'F4': 'f4',
        'F5': 'f5', 'F6': 'f6', 'F7': 'f7', 'F8': 'f8',
        'F9': 'f9', 'F10': 'f10', 'F11': 'f11', 'F12': 'f12',
        'CapsLock': 'capslock', 'NumLock': 'numlock', 'ScrollLock': 'scrolllock',
        'Pause': 'pause', 'PrintScreen': 'printscreen',
      };

      const mods = [];
      if (event.ctrlKey)  mods.push('ctrl');
      if (event.altKey)   mods.push('alt');
      if (event.metaKey)  mods.push('super');

      const mapped = KEY_MAP[key];
      if (mapped) {
        const keys = mods.length ? [...mods, mapped] : mapped;
        apiFetch("/key", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ key: keys }) });
      } else if (key.length === 1) {
        if (mods.length) {
          apiFetch("/key", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ key: [...mods, key.toLowerCase()] }) });
        } else {
          apiFetch("/type", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text: key, method: "type", send_enter: false }) });
        }
      }
    },

    async fetchSchedulerPause() {
      const res = await apiFetch("/scheduler/pause");
      if (res && res.ok) { const d = await res.json(); this.schedulerPaused = d.paused; }
    },

    async toggleSchedulerPause() {
      const next = !this.schedulerPaused;
      const res = await apiFetch("/scheduler/pause", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ paused: next }),
      });
      if (res && res.ok) this.schedulerPaused = next;
    },

    async sendRightClick(event) {
      event.preventDefault();
      this.onRemoteActivity();
      const img = event.currentTarget;
      const rect = img.getBoundingClientRect();
      const x = (event.clientX - rect.left) / rect.width;
      const y = (event.clientY - rect.top)  / rect.height;
      const res = await apiFetch("/click", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ x, y, monitor: this.selectedMonitor, button: "right" }),
      });
      clearTimeout(this._clickFeedbackTimer);
      this.clickFeedback = res && res.ok ? "Right-click sent" : "Click failed";
      this._clickFeedbackTimer = setTimeout(() => this.clickFeedback = "", 1500);
    },

    async signOut() {
      await fetch("/auth/logout", { method: "POST" });
      location.href = "/login";
    },

    addSite() {
      this.sites.push(defaultSite());
    },

    removeSite(i) {
      if (confirm(`Remove "${this.sites[i].name || 'this site'}"?`)) {
        this.sites.splice(i, 1);
      }
    },

    moveSite(i, dir) {
      const j = i + dir;
      if (j < 0 || j >= this.sites.length) return;
      [this.sites[i], this.sites[j]] = [this.sites[j], this.sites[i]];
    },

    exportSites() {
      const data = this.sites.map(({ _open, ...s }) => s);
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "sites_export.json";
      a.click();
      URL.revokeObjectURL(url);
    },

    async importSites(event) {
      const file = event.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        if (!Array.isArray(data)) throw new Error("Expected a JSON array");
        this.sites = data.map(s => ({ _open: false, login_steps: [], post_login_steps: [], ...s }));
        this.setStatus(`Imported ${data.length} site(s). Click Save to apply.`, "ok");
      } catch (e) {
        this.setStatus("Import failed: " + e.message, "err");
      }
      event.target.value = "";
    },

    async save() {
      this.saving = true;
      this.setStatus("Saving...", "");
      const invalid = this.sites.some(s => s.schedule.some(e => !this.schedEntryValid(e)));
      if (invalid) {
        this.setStatus("Fix invalid schedule entries (shown in red) before saving.", "err");
        this.saving = false;
        return;
      }
      const payload = this.sites.map(({ _open, ...s }) => s);
      try {
        const res = await apiFetch("/sites", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!res) return;
        if (!res.ok) throw new Error(await res.text());
        this.setStatus("Saved", "ok");
      } catch(e) {
        this.setStatus("Save failed: " + e.message, "err");
      } finally {
        this.saving = false;
      }
    },

    setStatus(msg, cls) {
      this.statusMsg = msg;
      this.statusClass = cls;
    },

    schedEntryValid(entry) {
      const _DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      const timeRe = /^([01]\d|2[0-3]):([0-5]\d)$/;
      const validDaySpec = spec => {
        if (!spec || spec.trim() === '*') return true;
        return spec.split(',').every(part => {
          part = part.trim();
          if (part.includes('-')) {
            const [a, b] = part.split('-').map(s => s.trim());
            return _DAYS.includes(a) && _DAYS.includes(b);
          }
          return _DAYS.includes(part);
        });
      };
      if (entry.length === 2) {
        return timeRe.test(entry[0]) && timeRe.test(entry[1]);
      }
      if (entry.length === 3) {
        return validDaySpec(entry[0]) && timeRe.test(entry[1]) && timeRe.test(entry[2]);
      }
      return false;
    },

    async fetchLogs() {
      try {
        const res = await apiFetch("/logs?lines=500");
        if (!res) return;
        const data = await res.json();
        this.logLines = data.lines || [];
        this.logUpdated = "Updated " + new Date().toLocaleTimeString();
        if (this.logAutoScroll) {
          await this.$nextTick();
          const el = this.$refs.logLines;
          if (el) el.scrollTop = el.scrollHeight;
        }
      } catch(e) {
        this.logUpdated = "Failed to load";
      }
    },

    logLineClass(line) {
      if (/\[WARNING\]|\[WARN\]/.test(line)) return "warn";
      if (/\[ERROR\]|\[CRITICAL\]/.test(line)) return "error";
      if (/\[DEBUG\]/.test(line)) return "debug";
      return "";
    },

    toggleAutoRefresh() {
      if (this._logTimer) { clearInterval(this._logTimer); this._logTimer = null; }
      if (this.logAutoRefresh) this._logTimer = setInterval(() => this.fetchLogs(), 5000);
    },

    async runUpdate() {
      this.updating = true;
      this.updateOutput = "";
      this.updateDone = false;
      try {
        const res = await apiFetch("/update", { method: "POST" });
        if (!res) return;
        const data = await res.json();
        this.updateOutput = data.output;
        this.updateDone = data.ok;
      } catch(e) {
        this.updateOutput = "Error: " + e.message;
      } finally {
        this.updating = false;
      }
    },

    async reboot() {
      if (!confirm("Reboot the system now?")) return;
      await apiFetch("/reboot", { method: "POST" });
    },

    async setAutostart() {
      try {
        await apiFetch("/autostart", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ enabled: this.startAtLogin }),
        });
      } catch(e) { /* non-critical */ }
    },

    async saveSettings() {
      this.settingsSaving = true;
      this.settingsStatusMsg = "Saving...";
      this.settingsStatusClass = "";
      try {
        const res = await apiFetch("/settings", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(this.settings),
        });
        if (!res) return;
        if (!res.ok) throw new Error(await res.text());
        this.settingsStatusMsg = "Saved";
        this.settingsStatusClass = "ok";
      } catch(e) {
        this.settingsStatusMsg = "Save failed: " + e.message;
        this.settingsStatusClass = "err";
      } finally {
        this.settingsSaving = false;
      }
    },
  };
}
</script>
